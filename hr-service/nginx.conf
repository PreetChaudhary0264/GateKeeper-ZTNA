events {
    worker_connections 1024;
}

http {
    # Upstream to internal hr-service (plain HTTP on different port)
    upstream hr_backend {
        server 127.0.0.1:19001;  #backend service yha chlri hai
    }

    server {
        listen 9001 ssl;
        server_name ztna-hr localhost;

        # Server certificate
        ssl_certificate /certs/hr-service.crt;
        ssl_certificate_key /certs/hr-service.key;

        # Client certificate verification (mTLS)
        ssl_client_certificate /certs/ca.crt;
        ssl_verify_client on;  #yhi line imp hai    Certificate nahi diya?
                                                    # → reject
                                                    
                                                    # Certificate invalid?
                                                    # → reject
                                                    
                                                    # Certificate unknown CA se signed?
                                                    # → reject
                                                    
                                                    # Certificate valid?
                                                    # → allow
        # add_header X-Client-Verify $ssl_client_verify;
        # add_header X-Client-DN $ssl_client_s_dn;

        ssl_verify_depth 2;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;  #ye generic hai but Production me aur strict cipher suite use karte hain.

        location / {
            proxy_pass http://hr_backend;  #ab request actual backedn pe forward kri jari hai
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Pass client certificate info to backend =>  abi backedn me strict check nhi hai but hum check kr skte hai ki nginx ne verify kra ya nhi
            proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        }
    }
}
